<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GreenHarmony · Formulario Zona</title>
        <link rel="stylesheet" th:href="@{/css/style.css}"/>
    </head>
    <body>
        <div class="app">
            <aside th:replace="~{fragmentos :: sidebar('zonas')}"></aside>
            <div class="main">
                <header class="topbar">
                    <span class="crumb">GreenHarmony</span>
                    <span class="crumb-sep">›</span>
                    <a th:href="@{/zonas/}" class="crumb">Zonas</a>
                    <span class="crumb-sep">›</span>
                    <span class="crumb-now" th:text="${zona.id != 0} ? 'Editar Zona' : 'Agregar Zona'"></span>
                    <div class="topbar-right">
                        <a th:href="@{/zonas/}" class="btn btn-outline btn-sm">Cancelar</a>
                    </div>
                </header>
                <div class="page">
                    <div class="page-header">
                        <div class="page-title" th:text="${zona.id != 0} ? 'Editar Zona' : 'Agregar Zona'"></div>
                    </div>
                    <div class="card">
                        <div style="padding:20px">
                            <form th:action="${zona.id != 0} ? @{/zonas/update} : @{/zonas/save}"
                                  th:object="${zona}" method="post">
                                <input type="hidden" th:field="*{id}"/>
                                <div class="field-grid">

                                    <div class="field">
                                        <label>Nombre de la zona *</label>
                                        <input class="input" type="text" th:field="*{nombreZona}"
                                               maxlength="100"
                                               th:classappend="${errorNombreZona} ? ' input-error'"/>
                                        <span class="hint error" th:if="${errorNombreZona}" th:text="${errorNombreZona}"></span>
                                    </div>

                                    <div class="field">
                                        <label>Tipo *</label>
                                        <input class="input" type="text" th:field="*{tipo}"
                                               maxlength="100"
                                               th:classappend="${errorTipo} ? ' input-error'"/>
                                        <span class="hint error" th:if="${errorTipo}" th:text="${errorTipo}"></span>
                                    </div>

                                    <div class="field">
                                        <label>Descripción</label>
                                        <input class="input" type="text" th:field="*{descripcion}"
                                               maxlength="255"
                                               th:classappend="${errorDescripcion} ? ' input-error'"/>
                                        <span class="hint error" th:if="${errorDescripcion}" th:text="${errorDescripcion}"></span>
                                    </div>

                                    <div class="field">
                                        <label>Capacidad máxima *</label>
                                        <input class="input" type="number" th:field="*{capacidadMaxima}"
                                               min="1" max="10000"
                                               th:classappend="${errorCapacidadMaxima} ? ' input-error'"/>
                                        <span class="hint error" th:if="${errorCapacidadMaxima}" th:text="${errorCapacidadMaxima}"></span>
                                    </div>

                                    <div class="field">
                                        <label>Cantidad actual</label>
                                        <input class="input" type="number" th:field="*{cantidadActual}"
                                               min="0"
                                               th:classappend="${errorCantidadActual} ? ' input-error'"/>
                                        <span class="hint error" th:if="${errorCantidadActual}" th:text="${errorCantidadActual}"></span>
                                    </div>

                                    <div class="field">
                                        <label>Temperatura promedio (°C)</label>
                                        <input class="input" type="number" step="0.01"
                                               th:field="*{temperaturaPromedio}"
                                               min="-50" max="80"
                                               th:classappend="${errorTemperaturaPromedio} ? ' input-error'"/>
                                        <span class="hint error" th:if="${errorTemperaturaPromedio}" th:text="${errorTemperaturaPromedio}"></span>
                                    </div>

                                    <div class="field">
                                        <label>Humedad promedio (%)</label>
                                        <input class="input" type="number" step="0.01"
                                               th:field="*{humedadPromedio}"
                                               min="0" max="100"
                                               th:classappend="${errorHumedadPromedio} ? ' input-error'"/>
                                        <span class="hint error" th:if="${errorHumedadPromedio}" th:text="${errorHumedadPromedio}"></span>
                                    </div>

                                    <div class="field">
                                        <label>Activa</label>
                                        <label class="check-opt">
                                            <input type="checkbox" name="activa" value="true"
                                                   th:checked="${zona.activa}"/>
                                            <span class="check-box">
                                                <svg viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2.5"
                                                     stroke-linecap="round" stroke-linejoin="round">
                                                <polyline points="1.5 5 4.5 8.5 10.5 1.5"/>
                                                </svg>
                                            </span>
                                            Activa
                                        </label>
                                    </div>

                                </div>
                                <button type="submit" class="btn btn-primary">Guardar</button>
                                <a th:href="@{/zonas/}" class="btn btn-outline">Cancelar</a>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
