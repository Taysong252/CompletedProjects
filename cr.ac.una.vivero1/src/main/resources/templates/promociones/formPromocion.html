<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GreenHarmony · Formulario Promoción</title>
        <link rel="stylesheet" th:href="@{/css/style.css}"/>
    </head>
    <body>
        <div class="app">
            <aside th:replace="~{fragmentos :: sidebar('promociones')}"></aside>
            <div class="main">
                <header class="topbar">
                    <span class="crumb">GreenHarmony</span>
                    <span class="crumb-sep">›</span>
                    <a th:href="@{/promociones/}" class="crumb">Promociones</a>
                    <span class="crumb-sep">›</span>
                    <span class="crumb-now" th:text="${promocion.id == 0} ? 'Agregar Promoción' : 'Editar Promoción'"></span>
                    <div class="topbar-right">
                        <a th:href="@{/promociones/}" class="btn btn-outline btn-sm">Cancelar</a>
                    </div>
                </header>
                <div class="page">
                    <div class="page-header">
                        <div class="page-title" th:text="${promocion.id == 0} ? 'Agregar Promoción' : 'Editar Promoción'"></div>
                    </div>
                    <div class="card">
                        <div style="padding:20px">
                            <form th:action="@{/promociones/save}" th:object="${promocion}" method="post">
                                <input type="hidden" th:field="*{id}"/>
                                <div class="field-grid">
                                    <div class="field">
                                        <label>Nombre Promoción</label>
                                        <input class="input" type="text" th:field="*{nombrePromocion}"/>
                                        <span class="hint error" th:text="${errorNombrePromocion}"></span>
                                    </div>
                                    <div class="field">
                                        <label>Descripción</label>
                                        <textarea class="input" th:field="*{descripcion}"></textarea>
                                        <span class="hint error" th:text="${errorDescripcion}"></span>
                                    </div>
                                    <div class="field">
                                        <label>Descuento (%)</label>
                                        <input class="input" type="number" step="0.01" min="0.01" max="100" th:field="*{descuentoPorcentaje}"/>
                                        <span class="hint error" th:text="${errorDescuentoPorcentaje}"></span>
                                    </div>
                                    <div class="field">
                                        <label>Monto Mínimo</label>
                                        <input class="input" type="number" step="0.01" min="0.01" th:field="*{montoMinimo}"/>
                                        <span class="hint error" th:text="${errorMontoMinimo}"></span>
                                    </div>
                                    <div class="field">
                                        <label>Código Promocional</label>
                                        <input class="input" type="text" th:field="*{codigoPromo}"/>
                                        <span class="hint error" th:text="${errorCodigoPromo}"></span>
                                    </div>
                                    <div class="field">
                                        <label>Fecha Inicio</label>
                                        <input class="input" type="date" th:field="*{fechaInicio}"/>
                                        <span class="hint error" th:text="${errorFechaInicio}"></span>
                                    </div>
                                    <div class="field">
                                        <label>Fecha Fin</label>
                                        <input class="input" type="date" th:field="*{fechaFin}"/>
                                        <span class="hint error" th:text="${errorFechaFin}"></span>
                                    </div>
                                    <div class="field">
                                        <label>Activa</label>
                                        <label class="check-opt">
                                            <input type="checkbox" name="activa" value="true" th:checked="${promocion.activa}"/>
                                            <span class="check-box">
                                                <svg viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                                    <polyline points="1.5 5 4.5 8.5 10.5 1.5"/>
                                                </svg>
                                            </span>
                                            Activa
                                        </label>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary">Guardar</button>
                                <a th:href="@{/promociones/}" class="btn btn-outline">Cancelar</a>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
